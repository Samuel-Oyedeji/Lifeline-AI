<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeLine AI · Ambulance</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0b1020;
      --bg-2:         #0e1426;
      --glass:        rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.10);
      --primary:      #3b82f6;
      --secondary:    #06b6d4;
      --success:      #22c55e;
      --warning:      #f59e0b;
      --critical:     #ef4444;
      --text:         #ffffff;
      --text-dim:     #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #amb-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    #amb-id {
      font-size: 17px;
      font-weight: 700;
      color: var(--secondary);
      letter-spacing: .02em;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      background: var(--glass);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
    }
    .leaflet-container { background: #0b1020; }
    .leaflet-control-attribution { background: rgba(11,16,32,0.8) !important; color: #64748b !important; }
    .leaflet-control-attribution a { color: #94a3b8 !important; }
    .leaflet-bar a {
      background: #0e1426 !important;
      color: #fff !important;
      border-color: rgba(255,255,255,0.12) !important;
    }
    .leaflet-bar a:hover { background: rgba(255,255,255,0.08) !important; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: #0e1426 !important;
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
    }

    /* ── Bottom panel ── */
    #panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(11,16,32,0.96) 28%);
      padding: 32px 16px 16px;
      pointer-events: none;
    }
    #panel.visible { display: block; }
    #panel .card {
      pointer-events: auto;
      background: rgba(14,20,38,0.92);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 16px 18px;
      backdrop-filter: blur(20px);
      margin-bottom: 10px;
    }
    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .panel-title { font-size: 20px; font-weight: 700; }
    .metrics { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
    .metric-k { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
    .metric-v { font-size: 18px; font-weight: 700; }

    /* security banner */
    #sec-banner {
      display: none;
      border-color: rgba(245,158,11,0.5);
      color: var(--warning);
      font-size: 14px;
    }
    #sec-banner.visible { display: block; }

    /* alternatives */
    #alts { display: none; gap: 8px; flex-wrap: wrap; }
    #alts.visible { display: flex; }
    .alt-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      transition: opacity .15s, transform .1s;
      margin-top: 10px;
    }
    .btn:hover { opacity: .9; transform: scale(1.01); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .btn-warn  { background: linear-gradient(135deg, #f59e0b, #d97706); }

    /* ── Toasts ── */
    #toasts {
      position: fixed;
      top: 70px; right: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
      max-width: 320px;
    }
    .toast {
      background: rgba(14,20,38,0.95);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 13px;
      animation: slideIn .25s ease;
      backdrop-filter: blur(12px);
    }
    .toast.error { border-color: rgba(239,68,68,0.5); color: var(--critical); }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--success); }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px) } to { opacity:1; transform: none } }

    /* ── GPS error banner ── */
    #gps-error {
      display: none;
      position: fixed;
      top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--critical);
      z-index: 999;
      text-align: center;
    }
    #gps-error.visible { display: block; }
  </style>
</head>
<body>

<div id="top-bar">
  <div>
    <div id="amb-label">Ambulance</div>
    <div id="amb-id">—</div>
  </div>
  <div class="chip" id="conn-chip">
    <span class="dot" id="conn-dot" style="background:#64748b"></span>
    <span id="conn-text">Connecting…</span>
  </div>
  <div class="chip" id="gps-chip">
    <span class="dot" id="gps-dot" style="background:#64748b"></span>
    <span id="gps-text">GPS: acquiring</span>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <!-- Route to patient -->
  <div id="pickup-card" class="card" style="display:none">
    <div class="panel-label">⬅ Route to Patient</div>
    <div class="panel-title" id="pickup-eta-text">—</div>
    <div class="metrics">
      <div>
        <div class="metric-k">Distance</div>
        <div class="metric-v" id="pickup-dist">—</div>
      </div>
      <div>
        <div class="metric-k">ETA</div>
        <div class="metric-v" id="pickup-eta" style="color:var(--success)">—</div>
      </div>
    </div>
    <button class="btn btn-green" id="pickup-btn" onclick="sendPickupComplete()">
      ✔ Patient Picked Up
    </button>
  </div>

  <!-- Hospital route -->
  <div id="hospital-card" class="card" style="display:none">
    <div class="panel-label">🏥 Route to Hospital</div>
    <div class="panel-title" id="hosp-name">—</div>
    <div class="metrics">
      <div>
        <div class="metric-k">Distance</div>
        <div class="metric-v" id="hosp-dist">—</div>
      </div>
      <div>
        <div class="metric-k">ETA (with incidents)</div>
        <div class="metric-v" id="hosp-eta" style="color:var(--warning)">—</div>
      </div>
    </div>
  </div>

  <!-- Security banner -->
  <div id="sec-banner" class="card">
    <strong>⚠ Security Detail Recommended</strong>
    <span id="sec-savings"></span>
  </div>

  <!-- Alternatives -->
  <div id="alts-wrap" style="display:none">
    <div class="panel-label" style="margin-bottom:6px">Other hospitals evaluated</div>
    <div id="alts"></div>
  </div>
</div>

<div id="gps-error">📍 Location permission denied — GPS will not stream.</div>
<div id="toasts"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
